<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakemalai - Ami ke?</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Bakemalai</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="about.html">Ami ke?</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1>Ami ke? (About Us)</h1>
        <p class="lead">Discover the story behind Bakemalai.</p>
    </main>

    <footer class="py-4 bg-light text-center border-top">
        <div class="container">
            <p class="mb-1">&copy; 2026 Bakemalai - bringing sweets to life</p>
            <p class="mb-0">Phone: 01310-834233 | Email: Raiyanmahmud58@gmail.com</p>
        </div>
    </footer>

    <!-- Floating Cart Button -->
    <button class="cart-floating-btn shadow-lg" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas">
        Cart <span id="cartBadge" class="badge rounded-pill cart-badge">0</span>
    </button>

    <!-- Cart Offcanvas -->
    <div class="offcanvas offcanvas-end candy-cart-sidebar" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom border-caramel">
            <h5 class="offcanvas-title fw-bold text-chocolate" id="cartOffcanvasLabel">Your Sweet Cart</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto pe-2">
                <!-- Cart items will be rendered here -->
            </div>
            <div class="border-top border-caramel pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5 text-chocolate">
                    <span>Total:</span>
                    <span>৳<span id="cartTotal">0</span></span>
                </div>
                <button onclick="clearCart()" class="btn btn-outline-chocolate w-100 mb-2">Clear Cart</button>
                <button onclick="confirmOrder()" class="btn btn-candy-pulse w-100 fw-bold border-0">Confirm Order</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
