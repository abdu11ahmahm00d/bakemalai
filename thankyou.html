<body style="background: linear-gradient(135deg, var(--color-chocolate), #2A1205); min-height: 100vh; overflow-x: hidden;">

    <main class="container text-center d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh; padding: 2vh 15px;">

        <a href="index.html" class="w-100 mb-3 mb-md-4">
            <img src="images/logo.png" alt="Bakemalai Logo" class="img-fluid"
                style="max-height: 20vh; max-width: 100%; width: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));" fetchpriority="high">
        </a>


        <style>
            .checkmark-svg {
                width: min(20vh, 120px);
                height: min(20vh, 120px);
                border-radius: 50%;
                display: block;
                stroke-width: 2;
                stroke: var(--color-candy-pink);
                stroke-miterlimit: 10;
                box-shadow: inset 0px 0px 0px var(--color-candy-pink);
                animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
                margin-bottom: min(4vh, 40px);
                overflow: visible;
            }

            .checkmark-circle {
                stroke-dasharray: 166;
                stroke-dashoffset: 166;
                stroke-width: 2;
                stroke-miterlimit: 10;
                stroke: var(--color-candy-pink);
                fill: none;
                animation: stroke-check 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
            }

            .checkmark-check {
                transform-origin: 50% 50%;
                stroke-dasharray: 48;
                stroke-dashoffset: 48;
                stroke-width: 4;
                stroke: var(--color-cream);
                fill: none;
                animation: stroke-check 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
            }

            @keyframes fill {
                100% {
                    box-shadow: inset 0px 0px 0px 60px var(--color-candy-pink);
                }
            }

            @keyframes scale {

                0%,
                100% {
                    transform: none;
                }

                50% {
                    transform: scale3d(1.1, 1.1, 1);
                }
            }
        </style>

        <svg class="checkmark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
        </svg>

        <h1 class="display-3 fw-bold mb-2 mb-md-4 gradient-text"
            style="font-family: var(--font-heading); text-shadow: 0px 2px 10px rgba(0,0,0,0.4); font-size: clamp(2rem, 8vw, 4rem);">Thank You!</h1>
        <p class="fs-2 mb-2 mb-md-3 text-white fst-italic" style="font-family: var(--font-subheading); letter-spacing: 0.5px; font-size: clamp(1.25rem, 5vw, 2rem) !important;">
            Your sweetness is on its way!</p>
        <p class="fs-5 mb-4 mb-md-5"
            style="color: var(--color-cream); font-family: var(--font-body); opacity: 0.9; max-width: 600px; font-size: clamp(1rem, 3vw, 1.25rem) !important;">We've
            received your order and are currently preparing it with love. Check your phone for a confirmation shortly.
        </p>

        <a href="shop.html"
            class="btn bm-btn-primary btn-lg rounded-pill px-4 py-2 px-md-5 py-md-3 shadow-lg fw-bold fs-5 text-white transition-all transform hover-scale"
            style="font-size: clamp(1rem, 4vw, 1.25rem) !important;">Continue
            Shopping &rarr;</a>
    </main>


    <div id="sugar-container"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden;">
    </div>

    <style>
        .sugar-grain {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(0.5px);
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            animation: sugar-float linear infinite;
        }

        @keyframes sugar-float {
            0% {
                transform: translateY(110vh) translateX(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-10vh) translateX(20px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>

    <script>
        function createSugar() {
            const container = document.getElementById('sugar-container');
            const particleCount = 200; // "Heavy amount"

            for (let i = 0; i < particleCount; i++) {
                const grain = document.createElement('div');
                grain.className = 'sugar-grain';

                // Randomize specs
                const size = Math.random() * 4 + 1;
                const left = Math.random() * 100;
                const duration = Math.random() * 7 + 5;
                const delay = Math.random() * 10;

                grain.style.width = `${size}px`;
                grain.style.height = `${size}px`;
                grain.style.left = `${left}%`;
                grain.style.animationDuration = `${duration}s`;
                grain.style.animationDelay = `-${delay}s`;

                container.appendChild(grain);
            }
        }
        document.addEventListener('DOMContentLoaded', createSugar);
    </script>
</body>

</html>
