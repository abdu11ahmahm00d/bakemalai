<head>

        content="View the Bakemalai gallery. A showcase of customized cakes and delightful Bangladeshi sweets.">

    <title>Bakemalai - Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .specialty-title, .section-title {
            font-family: var(--font-heading) !important;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Bakemalai</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"
                aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Ami ke?</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-5 pt-5" style="margin-top: 80px !important;">
        <h1 class="display-4 fw-bold text-center mb-2 specialty-title">Our Sweet Gallery</h1>
        <p class="lead text-center mb-5">Glimpses of our handcrafted delicacies and sweet moments.</p>

        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5 filter-btn-group">
            <button class="btn rounded-pill active px-4 py-2 shadow-sm" data-category="all"
                style="background-color: var(--color-candy-pink); color: #fff; border: none; font-weight: bold;">All</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="premium"
                style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Premium</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="classic"
                style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Classics</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="signature"
                style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Signature</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="teatime"
                style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Tea Time</button>
        </div>

        <div class="masonry-gallery"
            style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); grid-auto-rows: 8px;">
            
            <!-- Premium Collection -->
            <div class="masonry-item item-premium" data-animate="fadeInUp">
                <img src="images/chocolate_premium.png" loading="lazy" alt="Chocolate Premium - Ferrero Rocher Topping" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-premium" data-animate="fadeInUp" style="animation-delay: 50ms;">
                <img src="images/premium chocolate 2.jpg" loading="lazy" alt="Chocolate Overloaded - Maximum Chocolate Intensity" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-premium" data-animate="fadeInUp" style="animation-delay: 100ms;">
                <img src="images/red_velvet.jpg" loading="lazy" alt="Red Velvet Heart Cake - Signature Design" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-premium" data-animate="fadeInUp" style="animation-delay: 150ms;">
                <img src="images/black forest cherry.jpg" loading="lazy" alt="Black Forest Cherry - Fresh Cherries & Chocolate Shavings" class="img-fluid bg-light">
            </div>

            <!-- Classics -->
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 200ms;">
                <img src="images/premium chocolate.jpg" loading="lazy" alt="Classic Chocolate Cake - Rich Ganache Layers" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 250ms;">
                <img src="images/black_forest.jpg" loading="lazy" alt="Black Forest - Cherries & White Chocolate Curls" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 300ms;">
                <img src="images/drive-download-20260406T170135Z-1-001/butterscotched.jpg" loading="lazy" alt="Butterscotch Cake - Praline Layers" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 350ms;">
                <img src="images/lemon.jpg" loading="lazy" alt="Lemon Cake - Zesty Citrus Flavor" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 400ms;">
                <img src="images/blueberry.jpg" loading="lazy" alt="Blueberry Cake - Creamy Cheesecake Swirls" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 450ms;">
                <img src="images/moist cake.jpg" loading="lazy" alt="Chocolate Moist Cake - Melts in Your Mouth" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-classic" data-animate="fadeInUp" style="animation-delay: 500ms;">
                <img src="images/chocolate tub.jpg" loading="lazy" alt="Chocolate Tub Cake - Fun & Easy to Eat" class="img-fluid bg-light">
            </div>

            <!-- Signature Sweets -->
            <div class="masonry-item item-signature" data-animate="fadeInUp" style="animation-delay: 550ms;">
                <img src="images/roshmalai 3.jpg" loading="lazy" alt="Roshmalai Cake - Traditional Sweet Fusion" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-signature" data-animate="fadeInUp" style="animation-delay: 600ms;">
                <img src="images/jafrani_roshmalai.jpg" loading="lazy" alt="Jafrani Roshmalai - Saffron Infused Luxury" class="img-fluid bg-light">
            </div>

            <!-- Tea Time Cakes -->
            <div class="masonry-item item-teatime" data-animate="fadeInUp" style="animation-delay: 650ms;">
                <img src="images/vanilla tea time.jpg" loading="lazy" alt="Vanilla Tea Time - Butter & Oil Based Options" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-teatime" data-animate="fadeInUp" style="animation-delay: 700ms;">
                <img src="images/chocolate tea time.jpg" loading="lazy" alt="Chocolate Tea Time - Perfect for Tea Breaks" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-teatime" data-animate="fadeInUp" style="animation-delay: 750ms;">
                <img src="images/lemon tea time.jpg" loading="lazy" alt="Lemon Tea Time - Refreshing Citrus" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-teatime" data-animate="fadeInUp" style="animation-delay: 800ms;">
                <img src="images/marble cake.png" loading="lazy" alt="Marble Cake - Assorted 4 Pieces" class="img-fluid bg-light">
            </div>
        </div>
        </div>

        <div class="text-center mt-5 p-5 text-white rounded-3 shadow"
            style="background: linear-gradient(135deg, var(--color-chocolate), var(--color-caramel));"
            data-animate="fadeInUp">
            <h3 class="fw-bold mb-3" style="font-family: var(--font-heading);">Want something custom? Chat with Kiki 🧁
            </h3>
            <button class="btn bm-btn-primary rounded-pill px-4 py-2 shadow-lg mt-2"
                onclick="document.querySelector('.chatbot-floating-btn').click();">Start Chat</button>
        </div>
    </main>

    <footer class="py-4 bg-light text-center border-top">
        <div class="container">
            <p class="mb-1">&copy; 2026 | Bakemalai: Sweets to Life</p>
            <p class="mb-0">Phone: 01310-834233 | Email: bakemalai@gmail.com</p>
        </div>
    </footer>

    <button class="cart-floating-btn shadow-lg" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas"
        aria-controls="cartOffcanvas">
        Cart <span id="cartBadge" class="badge rounded-pill cart-badge">0</span>
    </button>

    <div class="offcanvas offcanvas-end candy-cart-sidebar" tabindex="-1" id="cartOffcanvas"
        aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom border-caramel">
            <h5 class="offcanvas-title fw-bold text-chocolate" id="cartOffcanvasLabel">Your Sweet Cart</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto pe-2">
            </div>
            <div class="border-top border-caramel pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5 text-chocolate">
                    <span>Total:</span>
                    <span>৳<span id="cartTotal">0</span></span>
                </div>
                <button onclick="clearCart()" class="btn btn-outline-chocolate w-100 mb-2">Clear Cart</button>
                <button onclick="handleCheckout()" class="btn btn-candy-pulse w-100 fw-bold border-0">Checkout</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
