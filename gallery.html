<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View the Bakemalai gallery. A showcase of customized cakes and delightful Bangladeshi sweets.">
    <meta property="og:title" content="Bakemalai - Gallery">
    <meta property="og:description" content="A visual taste of our beautifully crafted sweets and customized cakes.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero-placeholder.jpg">
    <title>Bakemalai - Gallery</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Bakemalai</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Ami ke?</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-5 pt-4">
        <h1 class="display-4 fw-bold text-center mb-2 specialty-title">Our Sweet Gallery</h1>
        <p class="lead text-center mb-5">Glimpses of our handcrafted delicacies and sweet moments.</p>

        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5 filter-btn-group">
            <button class="btn rounded-pill active px-4 py-2 shadow-sm" data-category="all" style="background-color: var(--color-candy-pink); color: #fff; border: none; font-weight: bold;">All</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="chocolate" style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Chocolate</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="black-forest" style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Black Forest</button>
            <button class="btn rounded-pill px-4 py-2 shadow-sm" data-category="special" style="background-color: var(--color-caramel); color: #fff; border: none; font-weight: bold;">Special</button>
        </div>

        <div class="masonry-gallery" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); grid-auto-rows: 8px;">
            <div class="masonry-item item-chocolate" data-animate="fadeInUp">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Rich chocolate cake layers" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-black-forest" data-animate="fadeInUp" style="animation-delay: 50ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Black forest slice with cherry" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-special" data-animate="fadeInUp" style="animation-delay: 100ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Jaafrani Roshmallai dessert bowl" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-chocolate" data-animate="fadeInUp" style="animation-delay: 150ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Chocolate fudge cupcakes" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-black-forest" data-animate="fadeInUp" style="animation-delay: 200ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Whole black forest cake" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-special" data-animate="fadeInUp" style="animation-delay: 250ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Lemon tea time cake" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-chocolate" data-animate="fadeInUp" style="animation-delay: 300ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Chocolate tub cake being served" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-special" data-animate="fadeInUp" style="animation-delay: 350ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Special customized premium cake" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-black-forest" data-animate="fadeInUp" style="animation-delay: 400ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Cherry topped black forest pastry" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-chocolate" data-animate="fadeInUp" style="animation-delay: 450ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Moist chocolate cake piece" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-special" data-animate="fadeInUp" style="animation-delay: 500ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Gift box of mixed Bakemalai sweets" class="img-fluid bg-light">
            </div>
            <div class="masonry-item item-chocolate" data-animate="fadeInUp" style="animation-delay: 550ms;">
                <img src="images/placeholder-gallery.jpg" loading="lazy" alt="Dark chocolate brownie" class="img-fluid bg-light">
            </div>
        </div>

        <div class="text-center mt-5 p-5 text-white rounded-3 shadow" style="background: linear-gradient(135deg, var(--color-chocolate), var(--color-caramel));" data-animate="fadeInUp">
            <h3 class="fw-bold mb-3" style="font-family: var(--font-heading);">Want something custom? Chat with Kiki 🧁</h3>
            <button class="btn bm-btn-primary rounded-pill px-4 py-2 shadow-lg mt-2" onclick="document.querySelector('.chatbot-floating-btn').click();">Start Chat</button>
        </div>
    </main>

    <footer class="py-4 bg-light text-center border-top">
        <div class="container">
            <p class="mb-1">&copy; 2026 Bakemalai - bringing sweets to life</p>
            <p class="mb-0">Phone: 01310-834233 | Email: Raiyanmahmud58@gmail.com</p>
        </div>
    </footer>

    <button class="cart-floating-btn shadow-lg" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas">
        Cart <span id="cartBadge" class="badge rounded-pill cart-badge">0</span>
    </button>

    <div class="offcanvas offcanvas-end candy-cart-sidebar" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom border-caramel">
            <h5 class="offcanvas-title fw-bold text-chocolate" id="cartOffcanvasLabel">Your Sweet Cart</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto pe-2">
            </div>
            <div class="border-top border-caramel pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5 text-chocolate">
                    <span>Total:</span>
                    <span>৳<span id="cartTotal">0</span></span>
                </div>
                <button onclick="clearCart()" class="btn btn-outline-chocolate w-100 mb-2">Clear Cart</button>
                <button onclick="confirmOrder()" class="btn btn-candy-pulse w-100 fw-bold border-0">Confirm Order</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
